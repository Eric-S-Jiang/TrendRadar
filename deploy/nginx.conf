# GPXX V3 — 添加到现有 Nginx 配置
# 使用方式（两种均可）：
#   A. 将此文件放到 /etc/nginx/conf.d/gpxx.conf（如果 nginx.conf 有 include conf.d/*.conf）
#   B. 将 server 块内容复制粘贴到现有 server 块中（如果已有 server 在监听 80）
#
# 前端静态文件目录：/opt/gpxx/data/frontend/dist/
# 后端地址：127.0.0.1:8000（docker-compose ports 绑定到宿主机）

upstream gpxx_backend {
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;          # 改为你的域名或 IP，如：server_name 8.159.159.48;

    # 前端静态文件
    root /opt/gpxx/data/frontend/dist;
    index index.html;

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # SSE — 禁用缓冲，保持长连接
    location /api/stream {
        proxy_pass http://gpxx_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;

        add_header Cache-Control no-cache;
        add_header X-Accel-Buffering no;
    }

    # API 反代
    location /api/ {
        proxy_pass http://gpxx_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;

        client_max_body_size 2m;
    }

    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }
}
